name: Docker CI (Changed Files Only)

on:
  pull_request:

jobs:
  docker-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect changed Dockerfiles and Compose files
        id: changes
        shell: bash
        run: |
          set -e

          BASE_REF="${{ github.event.pull_request.base.sha }}"
          HEAD_REF="${{ github.event.pull_request.head.sha }}"

          echo "Comparing $BASE_REF..$HEAD_REF"

          git diff --name-only "$BASE_REF" "$HEAD_REF" > changed_files.txt

          echo "Changed files:"
          cat changed_files.txt

          # Filter Dockerfiles
          grep -E '(^|/)Dockerfile(\..*)?$' changed_files.txt || true > dockerfiles.txt

          # Filter Compose files
          grep -E '(docker-compose\.ya?ml|compose\.ya?ml)$' changed_files.txt || true > composefiles.txt

          echo "Dockerfiles:"
          cat dockerfiles.txt || true

          echo "Compose files:"
          cat composefiles.txt || true

      - name: Build changed Dockerfiles (no cache)
        shell: bash
        run: |
          set -e

          if [ ! -s dockerfiles.txt ]; then
            echo "No Dockerfiles changed."
            exit 0
          fi

          while read dockerfile; do
            [ -z "$dockerfile" ] && continue

            dir=$(dirname "$dockerfile")
            file=$(basename "$dockerfile")

            echo "Building $dockerfile"

            docker build \
              --no-cache \
              -f "$dockerfile" \
              "$dir" \
              -t "ci-$(echo "$dir" | tr '/.' '--')"
          done < dockerfiles.txt

      - name: Build and run changed docker-compose files (no cache)
        shell: bash
        run: |
          set -e

          if [ ! -s composefiles.txt ]; then
            echo "No docker-compose files changed."
            exit 0
          fi

          while read composefile; do
            [ -z "$composefile" ] && continue

            echo "Processing $composefile"

            docker compose -f "$composefile" config

            docker compose -f "$composefile" build --no-cache

            docker compose -f "$composefile" up -d

            sleep 10

            docker ps

            docker compose -f "$composefile" down -v
          done < composefiles.txt
